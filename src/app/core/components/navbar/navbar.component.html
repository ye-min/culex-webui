<nav id="main-nav">
  <div class="container">
    <!--<a routerLink="/" class="logo">{{ word }}</a>-->
    <a routerLink="/" class="logo">不自洽，非欺人，即欺己。</a>
    <div class="nav-right">
      <ul class="nav-links">
        <li *ngFor="let link of navLinks">
          <a [routerLink]="link.path"
             routerLinkActive="active"
             [routerLinkActiveOptions]="{ exact: true }">
            {{ link.label }}
          </a>
        </li>
      </ul>
      <div class="icon-group">
        <a routerLink="/nav" class="nav-icon" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" aria-label="Nav">
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
          </svg>
        </a>
        <a routerLink="/tools" class="tools-icon" routerLinkActive="active" aria-label="Tools">
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7" rx="1"/>
            <rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/>
            <rect x="14" y="14" width="7" height="7" rx="1"/>
          </svg>
        </a>
        <a routerLink="/about" class="about-icon" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" aria-label="About">
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="4 17 10 11 4 5"/>
            <line x1="12" y1="19" x2="20" y2="19"/>
          </svg>
        </a>
      </div>
    </div>
  </div>
</nav>
