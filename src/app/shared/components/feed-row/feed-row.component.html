<a class="row" [ngClass]="item.type" [routerLink]="item.link" [attr.id]="'feed-' + item.type + '-' + item.date">
  <!-- Left: meta + title -->
  <div class="row-left">
    <div class="row-meta">
      <span class="row-date">{{ item.date }}</span>
      <div class="row-type">
        <span class="type-icon" [ngSwitch]="item.type">
          <!-- writing icon -->
          <svg *ngSwitchCase="'writing'" width="11" height="11" viewBox="0 0 11 11" fill="none">
            <line x1="0" y1="2"   x2="11"  y2="2"   stroke="var(--fg-3)" stroke-width="1" stroke-linecap="round"/>
            <line x1="0" y1="5.5" x2="7.5" y2="5.5" stroke="var(--fg-3)" stroke-width="1" stroke-linecap="round"/>
            <line x1="0" y1="9"   x2="9"   y2="9"   stroke="var(--fg-3)" stroke-width="1" stroke-linecap="round"/>
          </svg>
          <!-- photo icon -->
          <svg *ngSwitchCase="'photo'" width="11" height="11" viewBox="0 0 11 11" fill="none">
            <rect x="0.5" y="0.5" width="10" height="10" rx="1" stroke="var(--fg-3)" stroke-width="1"/>
            <circle cx="3.5" cy="4" r="1.1" fill="var(--fg-3)"/>
            <path d="M0.5 8 L3.5 5.5 L6 7.5 L8 5 L10.5 8" stroke="var(--fg-3)" stroke-width="0.9" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          </svg>
          <!-- ai icon -->
          <svg *ngSwitchCase="'ai'" width="11" height="11" viewBox="0 0 11 11" fill="none">
            <path d="M1.5 1 Q1 1 1 1.8 L1 6.2 Q1 7 1.8 7 L3 7 L3 9.5 L5.5 7 L9.2 7 Q10 7 10 6.2 L10 1.8 Q10 1 9.2 1 Z" stroke="var(--fg-3)" stroke-width="1" stroke-linejoin="round" fill="none"/>
          </svg>
        </span>
        <span class="type-label">{{ item.type }}</span>
      </div>
    </div>
    <span class="row-title">{{ item.title }}</span>
  </div>

  <!-- Divider -->
  <div class="row-divider"></div>

  <!-- Right: content varies by type -->
  <div class="row-right" [ngSwitch]="item.type">

    <!-- writing: 简介 -->
    <p *ngSwitchCase="'writing'" class="row-excerpt" [innerHTML]="item.excerpt"></p>

    <!-- photo: 方图组 + 总张数 -->
    <div *ngSwitchCase="'photo'" class="photo-strip">
      <div class="photo-thumb sq"
           *ngFor="let src of (item.coverImages | slice:0:5)">
        <img [src]="src" [alt]="item.title" loading="lazy">
      </div>
      <span *ngIf="getRemainingCount(item) > 0" class="photo-count">+{{ getRemainingCount(item) }}</span>
    </div>

    <!-- ai: 一问一答预览 -->
    <div *ngSwitchCase="'ai'" class="ai-exchange">
      <ng-container *ngIf="item.aiPreview">
        <div class="ai-line q" [innerHTML]="renderMarkdown(item.aiPreview.q)"></div>
        <div class="ai-line" [innerHTML]="renderMarkdown(item.aiPreview.a)"></div>
      </ng-container>
    </div>

  </div>
</a>
