<ng-container *ngIf="state$ | async as state">
  <!-- Success -->
  <main class="detail-page" *ngIf="state.data as chat">
    <!-- Hero header -->
    <header class="detail-header container">
      <div class="header-meta">
        <span class="accent-bar"></span>
        <span class="type-badge">Dialogue</span>
        <span class="meta-dot">·</span>
        <time class="meta-date">{{ chat.date }}</time>
      </div>
      <h1 class="detail-title">{{ chat.title }}</h1>
      <div *ngIf="chat.tags && chat.tags.length" class="detail-tags">
        <span *ngFor="let tag of chat.tags" class="detail-tag" (click)="navigateToTag(tag)">{{ tag }}</span>
      </div>
      <div class="header-rule"></div>
    </header>

    <!-- Dialogue -->
    <section class="transcript container">
      <div class="transcript-inner">
        <div class="turn"
             *ngFor="let msg of chat.messages; let i = index"
             [ngClass]="msg.role === 'user' ? 'q' : 'a'"
             [style.animation-delay]="(i * 0.08) + 's'">
          <div class="turn-indicator">
            <span class="turn-label">{{ msg.role === 'user' ? 'Human' : 'AI' }}</span>
          </div>
          <div class="turn-bubble" [innerHTML]="renderMessage(msg.content)"></div>
        </div>
      </div>
    </section>
  </main>

  <!-- Error / 404 -->
  <div *ngIf="!state.loading && state.data === null" class="not-found container">
    <span class="not-found-code">404</span>
    <p class="not-found-text">Dialogue not found.</p>
  </div>

  <!-- Loading Placeholder -->
  <div *ngIf="state.loading" class="loading-placeholder"></div>
</ng-container>
